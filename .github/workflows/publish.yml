name: Build and publish SonicDE RPM repo

on:
  workflow_dispatch:
  schedule: [{ cron: "17 */6 * * *" }]

permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: sonicde-rpm-repo, cancel-in-progress: false }
defaults: { run: { shell: bash } }

env:
  SPECS_GIT_URL: https://pc-rytteren.dk/forge/anders/SonicDE-rpmspecs.git
  SPECS_GIT_REF: master
  RPM_ARCH: x86_64

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v4
        with: { persist-credentials: false }

      - id: gpg
        uses: actions/cache@v4
        with: { path: .gpg, key: sonicde-gpg-key-v1 }

      - if: steps.gpg.outputs.cache-hit != 'true'
        run: |
          mkdir -p .gpg && chmod 700 .gpg
          export GNUPGHOME="$PWD/.gpg"
          cat >gpg-batch <<'EOF'
          %no-protection
          Key-Type: RSA
          Key-Length: 4096
          Subkey-Type: RSA
          Subkey-Length: 4096
          Name-Real: SonicDE RPM Repository
          Name-Email: sonicde-rpm-repo@users.noreply.github.com
          Expire-Date: 0
          %commit
          EOF
          gpg --batch --pinentry-mode loopback --generate-key gpg-batch

      - id: upstream
        run: |
          sha="$(git ls-remote "$SPECS_GIT_URL" "refs/heads/$SPECS_GIT_REF" | awk '{print $1}')"
          test -n "$sha"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - id: marker
        uses: actions/cache/restore@v4
        with:
          path: .built-upstream-sha
          key: sonicde-built-${{ steps.upstream.outputs.sha }}

      - if: github.event_name == 'workflow_dispatch' || steps.marker.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: rpm-cache
          key: sonicde-rpms-${{ runner.os }}-${{ steps.upstream.outputs.sha }}-${{ hashFiles('patches/**', '.github/workflows/*.yml') }}-${{ github.run_id }}
          restore-keys: |
            sonicde-rpms-${{ runner.os }}-${{ steps.upstream.outputs.sha }}-${{ hashFiles('patches/**', '.github/workflows/*.yml') }}-
            sonicde-rpms-${{ runner.os }}-${{ steps.upstream.outputs.sha }}-
            sonicde-rpms-${{ runner.os }}-

      - id: build
        if: github.event_name == 'workflow_dispatch' || steps.marker.outputs.cache-hit != 'true'
        run: |
          mkdir -p rpm-cache
          docker run -i --privileged --rm \
            -e SPECS_GIT_URL -e SPECS_GIT_REF -e RPM_ARCH \
            -e UPSTREAM_SHA='${{ steps.upstream.outputs.sha }}' \
            -e REPO_OWNER='${{ github.repository_owner }}' \
            -e REPO_NAME='${{ github.event.repository.name }}' \
            -v "$PWD:/work" -v "$PWD/rpm-cache:/rpm-cache" -w /work \
            fedora:latest bash -euxo pipefail <<'EOF'
          dnf -y install curl createrepo_c findutils git gnupg2 mock rpm-build rpm-sign rpmdevtools tar which
          FV="$(rpm -E %fedora)"; MC="fedora-${FV}-${RPM_ARCH}"
          export SPECS=/work/sonicde-rpmspecs RESULTS=/work/mock-results LOCAL=/work/localrepo WWW=/work/wwwroot GNUPGHOME=/work/.gpg
          export BIN="$WWW/fedora-${FV}/${RPM_ARCH}" SRC="$WWW/fedora-${FV}/source" FEDORA_VERSION="$FV" MOCK_CONFIG="$MC"
          mkdir -p "$SPECS" "$RESULTS" "$LOCAL" "$BIN" "$SRC" /rpm-cache && chmod 700 "$GNUPGHOME"
          createrepo_c "$LOCAL"

          FPR="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"; test -n "$FPR"
          gpg --batch --armor --export "$FPR" > "$WWW/RPM-GPG-KEY-sonicde"
          rpm --import "$WWW/RPM-GPG-KEY-sonicde"
          chown -R root:root "$GNUPGHOME" || true
          cat >/root/.rpmmacros <<RPMMACROS
          %_signature gpg
          %_gpg_name $FPR
          %_gpg_path $GNUPGHOME
          %_gpgbin /usr/bin/gpg
          %_gpg_digest_algo sha256
          %__gpg /usr/bin/gpg
          RPMMACROS

          git clone --depth 1 --branch "$SPECS_GIT_REF" "$SPECS_GIT_URL" "$SPECS"
          cat >/usr/local/bin/copr-cli <<'SHIM'
          #!/usr/bin/env bash
          set -euo pipefail
          [[ ${1:-} == buildscm ]] || exit 2; shift
          subdir= spec_name=
          while [[ $# -gt 0 ]]; do case "$1" in --subdir) subdir=$2; shift 2;; --spec) spec_name=$2; shift 2;; *) shift;; esac; done
          [[ -n $subdir && -n $spec_name ]] || exit 2
          p="$SPECS/$subdir"; s="$p/$spec_name"; o="$RESULTS/$subdir"; c="/rpm-cache/$subdir"
          mkdir -p "$o/srpm" "$o/rpm" "$c"
          log(){ echo "[$subdir] $*"; }
          [[ -f $s ]] || { log "missing spec $s"; exit 1; }
          sp="/work/patches/${spec_name}.patch"; xp="/work/patches/${spec_name%.spec}.source.patch"
          [[ ! -f $sp ]] || git -C "$SPECS" apply --unidiff-zero --verbose "$sp"
          [[ ! -f $xp ]] || cp -f "$xp" "$p/"
          fp="$({ echo "$UPSTREAM_SHA $FEDORA_VERSION $RPM_ARCH $subdir"; sha256sum "$s"; [[ ! -f $xp ]] || sha256sum "$xp"; } | sha256sum | awk '{print $1}')"
          if [[ -f $c/.fingerprint && $(cat "$c/.fingerprint") == "$fp" ]] && compgen -G "$c/*.rpm" >/dev/null; then
            log "using cached RPMs"; flock /work/localrepo.lock bash -c 'cp -f "$1"/*.rpm "$2"/; createrepo_c --update "$2"' _ "$c" "$LOCAL"; exit 0
          fi
          url="$(awk 'BEGIN{IGNORECASE=1} /^URL:[[:space:]]*/ {sub(/^URL:[[:space:]]*/, ""); print; exit}' "$s")"; [[ -n $url ]] || exit 1
          spectool --define "url $url" -g -C "$p" "$s"
          while read -r name srcurl; do [[ -f $p/$name ]] || curl -fL --retry 3 --retry-delay 5 -o "$p/$name" "${srcurl%%#*}"; done < <(
            rpmspec --define "url $url" -P "$s" | awk '/^Source[0-9]*:/ {u=$2; n=u; sub(/^.*#\//,"",n); sub(/^.*\//,"",n); print n, u}'
          )
          rpmbuild -bs "$s" --define "url $url" --define "_sourcedir $p" --define "_srcrpmdir $o/srpm"
          srpm="$(find "$o/srpm" -maxdepth 1 -name '*.src.rpm' -print -quit)"; [[ -n $srpm ]] || exit 1
          if ! mock -r "$MOCK_CONFIG" --uniqueext "$subdir" --define "url $url" --enable-network --resultdir "$o/rpm" --addrepo "file://$LOCAL" --rebuild "$srpm"; then
            for f in root.log build.log state.log installed_pkgs.log; do [[ ! -f $o/rpm/$f ]] || { echo "===== $subdir :: $f ====="; tail -n 300 "$o/rpm/$f"; }; done; exit 1
          fi
          echo "$fp" > "$c/.fingerprint"; cp -f "$o"/rpm/*.rpm "$c"/; cp -f "$o"/srpm/*.src.rpm "$c"/
          flock /work/localrepo.lock bash -c 'cp -f "$1"/*.rpm "$2"/; createrepo_c --update "$2"' _ "$c" "$LOCAL"
          SHIM
          chmod +x /usr/local/bin/copr-cli
          mock -r "$MOCK_CONFIG" --init
          (cd "$SPECS" && ./copr-build.sh all)

          find /rpm-cache -type f -name '*.rpm' ! -name '*.src.rpm' -exec cp -f {} "$BIN" \;
          find /rpm-cache -type f -name '*.src.rpm' -exec cp -f {} "$SRC" \;
          shopt -s nullglob; rpms=("$BIN"/*.rpm "$SRC"/*.src.rpm); [[ ${#rpms[@]} -gt 0 ]]
          for r in "${rpms[@]}"; do rpmsign --addsign "$r"; rpm --checksig "$r"; done
          createrepo_c "$BIN"; createrepo_c "$SRC"
          gpg --batch --yes --armor --detach-sign "$BIN/repodata/repomd.xml"
          gpg --batch --yes --armor --detach-sign "$SRC/repodata/repomd.xml"
          cat >"$WWW/sonicde-fedora-${FV}.repo" <<REPO
          [sonicde-fedora-${FV}]
          name=SonicDE Fedora ${FV}
          baseurl=https://${REPO_OWNER}.github.io/${REPO_NAME}/fedora-${FV}/${RPM_ARCH}
          enabled=1
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=https://${REPO_OWNER}.github.io/${REPO_NAME}/RPM-GPG-KEY-sonicde
          skip_if_unavailable=True
          REPO
          cat >"$WWW/index.html" <<HTML
          <!doctype html><meta charset="utf-8"><title>SonicDE RPM Repo</title><h1>SonicDE RPM Repo</h1><p>Fedora ${FV} / ${RPM_ARCH}</p><p><a href="sonicde-fedora-${FV}.repo">Repo file</a> · <a href="RPM-GPG-KEY-sonicde">GPG key</a> · <a href="fedora-${FV}/${RPM_ARCH}/">RPMs</a></p>
          HTML
          EOF

      - if: always() && steps.build.outcome != 'skipped'
        uses: actions/cache/save@v4
        with:
          path: rpm-cache
          key: sonicde-rpms-${{ runner.os }}-${{ steps.upstream.outputs.sha }}-${{ hashFiles('patches/**', '.github/workflows/*.yml') }}-${{ github.run_id }}

      - if: steps.build.outcome == 'success'
        run: echo '${{ steps.upstream.outputs.sha }}' > .built-upstream-sha

      - if: steps.build.outcome == 'success' && steps.marker.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .built-upstream-sha
          key: sonicde-built-${{ steps.upstream.outputs.sha }}

      - if: steps.build.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: wwwroot

      - if: steps.build.outcome == 'success'
        uses: actions/deploy-pages@v4
