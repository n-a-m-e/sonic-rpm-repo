name: Build and publish SonicDE RPM repo

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

env:
  SONICDE_GIT_URL: https://pc-rytteren.dk/forge/anders/SonicDE-rpmspecs.git
  SONICDE_GIT_REF: master
  RPM_ARCH: x86_64

jobs:
  build-publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Check GitHub Pages
        uses: actions/configure-pages@v5

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Get upstream commit
        id: upstream
        run: |
          set -euo pipefail
          sha="$(git ls-remote "$SONICDE_GIT_URL" "refs/heads/$SONICDE_GIT_REF" | awk '{print $1}')"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Upstream SHA: $sha"

      - name: Check build cache
        id: built-cache
        uses: actions/cache/restore@v4
        with:
          path: .built-upstream-sha
          key: sonicde-built-${{ steps.upstream.outputs.sha }}

      - name: Build SonicDE repo
        id: build
        if: steps.built-cache.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        env:
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          set -euo pipefail

          docker run -i --privileged --rm \
            -e SONICDE_GIT_URL \
            -e SONICDE_GIT_REF \
            -e UPSTREAM_SHA \
            -e RPM_ARCH \
            -e GITHUB_REPOSITORY \
            -v "$PWD:/work" \
            -w /work \
            fedora:latest \
            bash -euxo pipefail <<'EOF'
          dnf -y install \
            createrepo_c \
            curl \
            dnf-plugins-core \
            findutils \
            git \
            gnupg2 \
            mock \
            rpm-build \
            rpmdevtools \
            rpm-sign \
            tar

          FEDORA_VERSION="$(rpm -E %fedora)"
          MOCK_CONFIG="fedora-${FEDORA_VERSION}-${RPM_ARCH}"

          SPECS="/work/sonicde-rpmspecs"
          RESULTS="/work/mock-results"
          LOCAL_REPO="/work/localrepo"
          BIN_REPO="/work/wwwroot/fedora-${FEDORA_VERSION}/${RPM_ARCH}"
          SRC_REPO="/work/wwwroot/fedora-${FEDORA_VERSION}/source"

          rm -rf "$SPECS" "$RESULTS" "$LOCAL_REPO" /work/wwwroot
          mkdir -p "$RESULTS" "$LOCAL_REPO" "$BIN_REPO" "$SRC_REPO"

          git clone "$SONICDE_GIT_URL" "$SPECS"
          git -C "$SPECS" checkout "$UPSTREAM_SHA"

          cp /work/copr-build.sh "$SPECS/copr-build.sh"
          chmod +x "$SPECS/copr-build.sh"

          createrepo_c "$LOCAL_REPO"

          cat >/usr/local/bin/copr-cli <<'SHIM'
          #!/usr/bin/env bash
          set -euo pipefail

          [[ "${1:-}" == "buildscm" ]] || { echo "Only buildscm is supported" >&2; exit 2; }
          shift

          subdir=""
          spec_name=""
          while [[ $# -gt 0 ]]; do
            case "$1" in
              --subdir) subdir="${2:-}"; shift 2 ;;
              --spec) spec_name="${2:-}"; shift 2 ;;
              *) shift ;;
            esac
          done

          [[ -n "$subdir" && -n "$spec_name" ]] || { echo "Missing --subdir or --spec" >&2; exit 2; }

          pkgdir="$SPECS/$subdir"
          spec="$pkgdir/$spec_name"
          out="$RESULTS/$subdir"
          mkdir -p "$out/srpm" "$out/rpm"

          echo ""
          echo "========================================================================"
          echo "[$subdir] build start"
          echo "[$subdir] spec: $spec"
          echo "========================================================================"

          [[ -f "$spec" ]] || { echo "[$subdir] ERROR: spec not found: $spec" >&2; exit 1; }

          patch_file="/work/patches/${spec_name}.patch"
          if [[ -f "$patch_file" ]]; then
            echo "[$subdir] applying patch: $patch_file"
            git -C "$SPECS" apply --verbose "$patch_file"
          else
            echo "[$subdir] no per-spec patch found: $patch_file"
          fi

          cd "$pkgdir"

          spec_url="$(awk 'BEGIN{IGNORECASE=1} /^URL:[[:space:]]*/ {sub(/^URL:[[:space:]]*/, ""); print; exit}' "$spec")"
          if [[ -z "$spec_url" ]]; then
            echo "[$subdir] ERROR: URL: tag not found in $spec" >&2
            exit 1
          fi
          echo "[$subdir] defining rpm macro: url=$spec_url"

          echo "[$subdir] Source lines after patch, before download:"
          grep -nE '^(URL|Source[0-9]*):' "$spec" || true

          echo "[$subdir] spectool -l"
          spectool --define "url $spec_url" -l "$spec" || true

          echo "[$subdir] spectool -g -C $pkgdir"
          spectool --define "url $spec_url" -g -C "$pkgdir" "$spec"

          echo "[$subdir] package dir after spectool:"
          find "$pkgdir" -maxdepth 1 -type f -printf '  %f %s bytes\n' | sort

          mapfile -t expected_sources < <(
            rpmspec --define "url $spec_url" -P "$spec" | awk '
              /^Source[0-9]*:/ {
                src=$2
                sub(/^.*#\//, "", src)
                sub(/^.*\//, "", src)
                print src
              }'
          )

          echo "[$subdir] expected sources: ${expected_sources[*]:-<none>}"
          for expected in "${expected_sources[@]}"; do
            [[ -z "$expected" ]] && continue
            if [[ -f "$pkgdir/$expected" ]]; then
              echo "[$subdir] found expected source: $expected"
              continue
            fi

            fallback_url="$(rpmspec --define "url $spec_url" -P "$spec" | awk -v want="$expected" '
              /^Source[0-9]*:/ {
                src=$2
                final=src
                sub(/^.*#\//, "", final)
                sub(/^.*\//, "", final)
                if (final == want) {
                  sub(/#.*/, "", src)
                  print src
                  exit
                }
              }')"

            if [[ -n "$fallback_url" && "$fallback_url" != *'%{'* ]]; then
              echo "[$subdir] fallback downloading $fallback_url -> $expected"
              curl -L --fail --retry 3 -o "$pkgdir/$expected" "$fallback_url"
            else
              echo "[$subdir] ERROR: cannot resolve source URL for $expected; got '$fallback_url'" >&2
              exit 1
            fi
          done

          echo "[$subdir] creating SRPM"
          rpmbuild -bs "$spec" \
            --define "url $spec_url" \
            --define "_sourcedir $pkgdir" \
            --define "_srcrpmdir $out/srpm"

          srpm="$(find "$out/srpm" -maxdepth 1 -name '*.src.rpm' -print -quit)"
          [[ -n "$srpm" ]] || { echo "[$subdir] ERROR: SRPM not produced" >&2; exit 1; }
          cp -f "$srpm" "$SRC_REPO/"

          echo "[$subdir] mock rebuild: $srpm"
          if ! mock -r "$MOCK_CONFIG" \
            --uniqueext "$subdir" \
            --define "url $spec_url" \
            --enable-network \
            --resultdir "$out/rpm" \
            --addrepo "file://$LOCAL_REPO" \
            --rebuild "$srpm"; then
            echo "[$subdir] ERROR: mock failed"
            for log in root.log build.log state.log hw_info.log installed_pkgs.log; do
              [[ -f "$out/rpm/$log" ]] || continue
              echo "===== [$subdir] $log ====="
              sed -n '1,260p' "$out/rpm/$log" || true
              echo "===== [$subdir] tail $log ====="
              tail -n 260 "$out/rpm/$log" || true
            done
            exit 1
          fi

          while IFS= read -r rpm; do
            cp -f "$rpm" "$BIN_REPO/"
            flock /work/localrepo.lock bash -c 'cp -f "$1" "$2"/ && createrepo_c --update "$2"' _ "$rpm" "$LOCAL_REPO"
          done < <(find "$out/rpm" -maxdepth 1 -type f -name '*.rpm' ! -name '*.src.rpm' -print)

          echo "[$subdir] build complete"
          SHIM
          chmod +x /usr/local/bin/copr-cli

          echo "--- one-time mock initialization to warm caches ---"
          mock -r "$MOCK_CONFIG" --init

          cd "$SPECS"
          ./copr-build.sh all

          echo "--- final repo metadata ---"
          createrepo_c "$BIN_REPO"
          createrepo_c "$SRC_REPO"

          cat > "/work/wwwroot/sonicde-fedora-${FEDORA_VERSION}.repo" <<REPO
          [sonicde-fedora-${FEDORA_VERSION}]
          name=SonicDE Fedora ${FEDORA_VERSION}
          baseurl=https://${GITHUB_REPOSITORY%%/*}.github.io/${GITHUB_REPOSITORY#*/}/fedora-${FEDORA_VERSION}/${RPM_ARCH}
          enabled=1
          gpgcheck=0
          repo_gpgcheck=0
          skip_if_unavailable=True
          REPO

          cat > /work/wwwroot/index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head><meta charset="utf-8"><title>SonicDE RPM Repo</title></head>
          <body>
            <h1>SonicDE RPM Repo</h1>
            <p>Fedora ${FEDORA_VERSION} / ${RPM_ARCH}</p>
            <p><a href="sonicde-fedora-${FEDORA_VERSION}.repo">Download repo file</a></p>
            <p><a href="fedora-${FEDORA_VERSION}/${RPM_ARCH}/">Browse RPMs</a></p>
          </body>
          </html>
          HTML
          EOF

          echo "${{ steps.upstream.outputs.sha }}" > .built-upstream-sha

      - name: Save build cache marker
        if: steps.build.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: .built-upstream-sha
          key: sonicde-built-${{ steps.upstream.outputs.sha }}

      - name: Upload Pages artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: wwwroot

      - name: Deploy to GitHub Pages
        if: steps.build.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4
